server:
  port: 8080

spring:
  datasource:
    url: 
    username: 
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  redis:
    host: localhost
    port: 6379
    password:  # optional if Redis is secured
    timeout: 60000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: 
    password: 
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: =
  expiration: 3600000 # 1 hour in milliseconds

cors:
  allowed-origins: "*"
  allowed-methods: GET,POST,PUT,DELETE
  allowed-headers: "*"

cloudinary: 
 cloud_name: 
 api_key: 
 api_secret: 


razorpay:
 key: 
 secret: 


r2:
  projects:
    bucket: 
  reviews:
    bucket: 
  certificates:
    bucket: 
  account:
    id: 
    endpoint: 
  custom:
    domain: 
  access:
    key: 
  secret:
    key: 
  endpoint:

logging:
  level:
    com.certplatform.auth: INFO
  file:
    name: logs/auth.log
